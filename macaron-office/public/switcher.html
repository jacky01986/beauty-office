<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>Meta 多帳戶切換器 — Macaron de Luxe</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: #1a1a1a; color: #f0e5d6; margin: 0; padding: 24px; }
  h1 { font-size: 22px; margin: 0 0 8px; color: #f5d49e; }
  .subtitle { color: #aaa; margin-bottom: 24px; font-size: 14px; }
  .card { background: #2a2520; border: 1px solid #4a3a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; margin: 0 0 12px; color: #f5d49e; }
  .row { display: flex; align-items: center; padding: 10px 12px; border: 1px solid #3a3025; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.15s; }
  .row:hover { background: #3a302a; border-color: #8a7050; }
  .row.active { background: #3a4a35; border-color: #4CAF50; }
  .row.disabled { opacity: 0.45; cursor: not-allowed; }
  .row .name { flex: 1; font-weight: 500; }
  .row .id { color: #888; font-size: 12px; margin-left: 8px; font-family: monospace; }
  .row .ig { color: #E1306C; font-size: 12px; margin-left: 12px; font-weight: 600; }
  .badge-active { background: #4CAF50; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 8px; }
  .badge-disabled { background: #777; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 8px; }
  .err { color: #ff8888; padding: 8px 12px; background: #3a1f1f; border-radius: 6px; font-size: 13px; }
  .loading { color: #888; padding: 12px; }
  .toolbar { margin-top: 16px; }
  .btn { background: #f5d49e; color: #2a1a10; border: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .btn:hover { background: #e8c280; }
  .btn-secondary { background: #555; color: white; }
  .status-bar { background: #2a2520; border: 1px solid #4a3a2a; padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; color: #d0c0a8; }
</style>
</head>
<body>
<h1>🔄 Meta 多帳戶切換器</h1>
<p class="subtitle">點選要切換到的 FB 粉絲頁（自動連動 IG）或廣告帳戶。VICTOR 從下一秒看新數據。</p>
<div id="status" class="status-bar">載入中...</div>
<div class="card">
  <h2>📘 FB 粉絲頁（選了會自動連動 IG）</h2>
  <div id="pages"><div class="loading">載入中...</div></div>
</div>
<div class="card">
  <h2>📊 廣告帳戶</h2>
  <div id="ads"><div class="loading">載入中...</div></div>
</div>
<div class="toolbar">
  <button class="btn btn-secondary" onclick="clearOverride()">清除覆寫（還原 Render env）</button>
  <a href="/" style="margin-left: 12px; color: #f5d49e;">← 回主辦公室</a>
</div>
<script>
let assets = null;
async function loadAssets() {
  try {
    const res = await fetch('/api/meta/assets');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    assets = await res.json();
    render();
  } catch (e) {
    document.getElementById('status').innerHTML = '<span class="err">無法載入：' + e.message + '</span>';
  }
}
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }
function render() {
  const cur = assets.current || {};
  const ov = assets.override || {};
  let s = '目前使用中：FB Page = ' + (cur.pageId || '未設') + ' ／ IG = ' + (cur.igId || '未設') + ' ／ Ad = ' + (cur.adAccountId || '未設');
  if (Object.keys(ov).length > 0) s += ' （已套用覆寫）';
  document.getElementById('status').textContent = s;
  const pagesEl = document.getElementById('pages');
  const pages = assets.pages || [];
  if (pages.length === 0) {
    pagesEl.innerHTML = '<div class="loading">沒有粉絲頁可切換 — 把 System User 加到 BM 的粉絲頁資產</div>';
  } else {
    pagesEl.innerHTML = '';
    pages.forEach(p => {
      const isActive = p.pageId === cur.pageId;
      const div = document.createElement('div');
      div.className = 'row' + (isActive ? ' active' : '');
      div.innerHTML = '<span class="name">' + escapeHtml(p.name) + '</span>' +
        '<span class="id">FB:' + escapeHtml(p.pageId) + '</span>' +
        (p.igId ? '<span class="ig">📷 IG @' + escapeHtml(p.igUsername || '') + '</span>' : '<span class="ig" style="color:#666">無 IG</span>') +
        (isActive ? '<span class="badge-active">使用中</span>' : '');
      div.onclick = () => switchPage(p);
      pagesEl.appendChild(div);
    });
  }
  const adsEl = document.getElementById('ads');
  const ads = assets.ad_accounts || assets.adAccounts || [];
  if (ads.length === 0) {
    adsEl.innerHTML = '<div class="loading">沒有廣告帳戶</div>';
  } else {
    adsEl.innerHTML = '';
    ads.forEach(a => {
      const aid = a.adAccountId || a.id;
      const isActive = aid === cur.adAccountId || aid === ('act_' + cur.adAccountId) || aid?.replace('act_','') === cur.adAccountId;
      const isDisabled = a.status === 'disabled';
      const div = document.createElement('div');
      div.className = 'row' + (isActive ? ' active' : '') + (isDisabled ? ' disabled' : '');
      div.innerHTML = '<span class="name">' + escapeHtml(a.name) + '</span>' +
        '<span class="id">' + escapeHtml(aid) + '</span>' +
        '<span class="ig" style="color:#aaa">' + escapeHtml(a.currency || '') + '</span>' +
        (isActive ? '<span class="badge-active">使用中</span>' : '') +
        (isDisabled ? '<span class="badge-disabled">停用</span>' : '');
      if (!isDisabled) div.onclick = () => switchAd(a);
      adsEl.appendChild(div);
    });
  }
}
async function switchPage(p) {
  let msg = '切換到「' + p.name + '」(FB ' + p.pageId + ')';
  if (p.igId) msg += '\n會同時切到 IG @' + (p.igUsername || p.igId);
  msg += '\n\n確認嗎？';
  if (!confirm(msg)) return;
  await postSwitch({ pageId: p.pageId, igId: p.igId });
}
async function switchAd(a) {
  if (!confirm('切換廣告帳戶到「' + a.name + '」？')) return;
  await postSwitch({ adAccountId: a.adAccountId || a.id });
}
async function postSwitch(payload) {
  try {
    const res = await fetch('/api/meta/switch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    alert('✓ 已切換');
    loadAssets();
  } catch (e) {
    alert('切換失敗：' + e.message);
  }
}
async function clearOverride() {
  if (!confirm('清除覆寫，還原成 Render 環境變數？')) return;
  try {
    await fetch('/api/meta/switch?clear=1', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    alert('✓ 已清除');
    loadAssets();
  } catch (e) { alert('清除失敗：' + e.message); }
}
loadAssets();
</script>
</body>
</html>
